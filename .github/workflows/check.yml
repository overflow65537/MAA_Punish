name: check

on:
  push:
    branches:
      - "main"
    paths:
      - ".github/workflows/check.yml"
      - "interface.json"
      - "i18n/**"
      - "resource/**"
      - "tasks/**"
      - "tools/ci/**"
      - "tools/schema/**"
  pull_request:
    branches:
      - "**"
    paths:
      - ".github/workflows/check.yml"
      - "interface.json"
      - "i18n/**"
      - "resource/**"
      - "tasks/**"
      - "tools/ci/**"
      - "tools/schema/**"
  workflow_dispatch:

jobs:
  resource:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Use Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Run maa-checker
        run: |
          # Always use latests @nekosu/maa-checker
          npx @nekosu/maa-checker@latest ./interface.json --github=.

      # pip install maafw
      - name: Install maafw
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade maafw --pre

      - name: Check Resource
        run: |
          python ./tools/ci/check_resource.py ./resource/base ./resource/pgr_win32 ./resource/playcover ./resource/zh_TW ./resource/ja_JP

      - name: Validate JSON Schema
        run: |
          python -m pip install jsonschema==4.26.0 referencing==0.37.0
          python tools/ci/validate_schema.py
